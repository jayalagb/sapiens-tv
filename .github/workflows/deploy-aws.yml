name: Deploy Backend to AWS EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'admin/**'
      - 'public/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/sapiens-tv
            git pull origin main
            cd backend
            npm install --production
            pm2 restart sapiensfutura || pm2 start server.js --name sapiensfutura
